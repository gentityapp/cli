name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Typecheck + smoke build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Build (linux-x64 smoke)
        run: bun run build:linux-x64
      - name: Run --help
        run: ./dist/gentity-linux-x64 --help
